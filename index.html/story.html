
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Art of Luminosity</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;

        /* Soft makeup background */
        background-image: url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }

    /* Overlay for soft effect */
    .overlay {
        background: rgba(255, 245, 247, 0.85);
        min-height: 100vh;
        padding: 50px;
    }

    /* Title */
    h1 {
        text-align: center;
        font-family: 'Playfair Display', serif;
        font-size: 50px;
        color: #b76e79;
        margin-bottom: 10px;
    }

    /* Subtitle */
    h2 {
        text-align: center;
        font-weight: 300;
        color: #8c5a63;
        margin-bottom: 40px;
    }

    /* Story box */
    .story {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        text-align: center;
        line-height: 1.8;
        color: #5e4b4f;
    }

    .story p {
        margin: 15px 0;
    }

    /* Glow text */
    .highlight {
        color: #d48a9a;
        font-weight: bold;
        font-size: 18px;
    }

    /* Button */
    .btn {
        margin-top: 30px;
        padding: 12px 25px;
        background: #f7c6d0;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #eaa3b1;
    }

    footer {
        text-align: center;
        margin-top: 40px;
        color: #a07b82;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="overlay">

    <h1>The Art of Luminosity</h1>
    <h2>Beauty isn’t about perfection — it’s about glow ✨</h2>

    <div class="story">
        <p>
            With soft touches of beige and baby pink, we create more than makeup…
            we create a feeling.
        </p>

        <p>
            A quiet confidence, a natural shine, a moment just for you.
        </p>

        <p class="highlight">
            Welcome, beautiful.<br>
            This is your glow ✨
        </p>

        <button class="btn">Discover Your Glow</button>
    </div>

    <footer>
        © 2026 The Art of Luminosity
    </footer>

</div>

</body>
</html>
