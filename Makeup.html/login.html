<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
/* LOGIN BACKGROUND */
body {
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;

    background-image: url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    position: relative;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.3);
    z-index: 1;
}

/* LOGIN FORM CONTAINER */
.login-container {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.85);
    padding: 50px 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    color: #333;
}

.login-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: #b76e79;
    margin-bottom: 10px;
}

.login-container h3 {
    font-weight: 300;
    color: #8c5a63;
    margin-bottom: 30px;
}

/* FORM FIELDS */
.form-control {
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
}

/* REMEMBER ME */
.form-check-input {
    width: 18px;
    height: 18px;
    cursor: pointer;
    border-radius: 4px;
}

.form-check-label {
    font-size: 14px;
    font-weight: 500;
    color: #5e4b4f;
    margin-left: 5px;
}

/* LOGIN BUTTON */
.btn-login {
    padding: 12px 25px;
    background: #f7c6d0;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    color: white;
    font-weight: bold;
}

.btn-login:hover {
    background: #eaa3b1;
}
</style>
</head>
<body>

<div class="login-container">
    <h1>Login</h1>
    <h3>Welcome back, beautiful ✨</h3>

    <form>
        <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <input type="password" class="form-control" placeholder="Password" required>
        </div>

        <!-- REMEMBER ME -->
        <div class="form-check mb-3" style="text-align: left;">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">
                Remember Me
            </label>
        </div>

        <button type="submit" class="btn-login">Login</button>
    </form>
</div>

</body>
</html>
