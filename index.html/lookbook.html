<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lookbook</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    color: white;
}

/* SAME BACKGROUND */
.lookbook {
    min-height: 100vh;
    background-image: url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    position: relative;
    padding: 80px 50px;
}

/* DARK + COLOR FADE OVERLAY */
.lookbook::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.7),
        rgba(201,79,124,0.4),
        rgba(0,0,0,0.8)
    );
    z-index: 1;
}

/* CONTENT ABOVE OVERLAY */
.content {
    position: relative;
    z-index: 2;
}

/* TITLE */
h1 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-size: 50px;
    margin-bottom: 60px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

/* IMAGE CARD */
.card {
    overflow: hidden;
    border-radius: 10px;
    position: relative;
}

/* IMAGES */
.card img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    transition: 0.5s;
}

/* HOVER ZOOM */
.card:hover img {
    transform: scale(1.1);
}

/* FADE OVER IMAGE */
.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to top,
        rgba(0,0,0,0.6),
        transparent
    );
}

/* OPTIONAL TEXT */
.caption {
    position: absolute;
    bottom: 15px;
    left: 15px;
    font-size: 12px;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<div class="lookbook">
